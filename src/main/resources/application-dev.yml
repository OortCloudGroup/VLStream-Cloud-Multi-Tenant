#Data source configuration
spring:
  data:
    redis:
      ##redis Standalone environment configuration
      host: ${REDIS_HOST:192.168.60.77}
      port: ${REDIS_PORT:32576}
      database: 1
      password: ${REDIS_PASSWORD:redis@pass}
      ssl:
        enabled: false
      ##redis Cluster environment configuration
      #cluster:
      #  nodes: 127.0.0.1:7001,127.0.0.1:7002,127.0.0.1:7003
      #  commandTimeout: 5000
  #excludeDruidDataSourceAutoConfigure
  autoconfigure:
    exclude: com.alibaba.druid.spring.boot3.autoconfigure.DruidDataSourceAutoConfigure
  datasource:
    # MySql Master data source information
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:192.168.60.77}:${DB_PORT:32443}/${DB_NAME:apaas_vlstream}?useSSL=false&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&serverTimezone=GMT%2B8&nullCatalogMeansCurrent=true&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:mysql@pass}
    dynamic:
      druid:
        #General verification configuration
        validation-query: select 1
        #enablesqlLog interceptor
        proxy-filters: sqlLogInterceptor
      #Set the default data source or data source group,The default value ismaster
      primary: master
      datasource:
        apaasUser:
          druid:
            validation-query: select 1
          driver-class-name: com.mysql.cj.jdbc.Driver
          #    url: jdbc:mysql://${DB_HOST:192.168.50.108}:${DB_PORT:32443}/apaas_user?useSSL=false&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&serverTimezone=GMT%2B8&nullCatalogMeansCurrent=true&allowPublicKeyRetrieval=true
          #    url: jdbc:mysql://${DB_HOST:192.168.50.109}:${DB_PORT:32443}/apaas_user?useSSL=false&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&serverTimezone=GMT%2B8&nullCatalogMeansCurrent=true&allowPublicKeyRetrieval=true
          url: jdbc:mysql://${DB_HOST:192.168.60.77}:${DB_PORT:32443}/${USER_DB_NAME:apaas_user}?useSSL=false&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&serverTimezone=GMT%2B8&nullCatalogMeansCurrent=true&allowPublicKeyRetrieval=true
          username: ${DB_USERNAME:root}
          password: ${DB_PASSWORD:mysql@pass}
        apaasReport:
          druid:
            validation-query: select 1
          driver-class-name: com.mysql.cj.jdbc.Driver
          #    url: jdbc:mysql://${DB_HOST:192.168.50.108}:${DB_PORT:32443}/apaas_user?useSSL=false&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&serverTimezone=GMT%2B8&nullCatalogMeansCurrent=true&allowPublicKeyRetrieval=true
          #    url: jdbc:mysql://${DB_HOST:192.168.50.109}:${DB_PORT:32443}/apaas_user?useSSL=false&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&serverTimezone=GMT%2B8&nullCatalogMeansCurrent=true&allowPublicKeyRetrieval=true
          url: jdbc:mysql://${DB_HOST:192.168.60.77}:${DB_PORT:32443}/${REPORT_DB_NAME:apaas_report_designer}?useSSL=false&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&serverTimezone=GMT%2B8&nullCatalogMeansCurrent=true&allowPublicKeyRetrieval=true
          username: ${DB_USERNAME:root}
          password: ${DB_PASSWORD:mysql@pass}
#Third party login
social:
  enabled: true
  domain: http://127.0.0.1:2888

#ossDefault configuration
oss:
  #turn onossConfiguration
  enabled: true
  #turn onosstype
  #minio、s3、qiniu、alioss、huaweiobs、tencentcos
  name: minio
  #Tenant model
  tenant-mode: true
  #ossService address
  endpoint: http://172.30.0.90:9000
  #ossTranslation service address, Used to change the return address to the converted external network address after uploading to the intranet
  #transform-endpoint: http://172.30.0.90:9000
  #accesskey
  access-key: bladexadmin
  #keykey
  secret-key: bladexadmin
  #bucket
  bucket-name: bladex
#jobService configuration
powerjob:
  worker:
    enabled: false
    app-name: vls-job
    port: 37777
    server-address: 192.168.60.75:30260
#bladeConfiguration
blade:
  #Distributed lock configuration
  lock:
    ##Whether to enable distributed locks
    enabled: true
    address: redis://${REDIS_HOST:192.168.60.77}:${REDIS_PORT:32576}
    password: ${REDIS_PASSWORD:redis@pass}
    database: 1
  token:
    #Tenant type configuration Single tenant or multi-tenant? single multi
    tenant-type: ${SSO_TENANT_TYPE:multi}
    #Multi-tenant verificationtokenaddress local area network192.168.60.77 Government Affairs Network192.168.50.109 internet192.168.50.108
    multi-tenant-verify-token-address: ${SSO_MULTI_TENANT_VERIFY_TOKEN:http://oort.oortcloudsmart.com:21410/bus/apaas-sso/sso/v1/verifyToken}
    #Get multi-tenant user information
    multi-tenant-admin-user-url: ${GET_MULTI_TENANT_ADMIN_USER_URL:http://oort.oortcloudsmart.com:21410/bus/apaas-user/user/v1/userInfo}
    #Single tenant verificationtokenaddress
    single-tenant-verify-token-address: ${SSO_SINGLE_TENANT_VERIFY_TOKEN:http://oort.oortcloudsmart.com:21310/oort/oortcloud-sso/sso/v1/verifyToken}
    #Get single tenant user information
    single-tenant-admin-user-url: ${GET_SINGLE_TENANT_ADMIN_USER_URL:http://oort.oortcloudsmart.com:21310/oort/oortcloud-sso/sso/v1/getUserInfo}
  #aiLarge model docking
  dify:
    baseUrl: ${DIFY_BASE_URL:http://192.168.88.172/v1}
    chatApi: ${DIFY_CHAT_API:app-hJSSV772FDkXY2ZEebBdIMF6}
    completionApi: ${DIFY_COMPLETION_API:}
    workflowApi: ${DIFY_WORKFLOW_API:app-r1GmS7KJ1FPDXUJVeJhhLNGE}
    chatFlowApi: ${DIFY_CHATFLOW_API:}
    datasetsApi: ${DIFY_DATASETS_API:}
#Multi-tenant file upload
apaas:
  #File upload method path
  fileUpload: ${FILE_UPLOAD:http://oort.oortcloudsmart.com:21410/bus/apaas-fastdfsservice/fastdfs/v1/uploadFile}

# Business configuration
vlstream:
  person-detection:
    enabled: false
  face-detection:
    enabled: false
  object-detection:
    enabled: false
  classify-detection:
    enabled: false
  instance-seg-detection:
    enabled: false
  obb-detection:
    enabled: false
  pose-detection:
    enabled: false
  semseg-detection:
    enabled: false
  ssh:
    host: ${VLSTREAM_SSH_HOST:192.168.88.173}
    port: ${VLSTREAM_SSH_PORT:22}
    username: ${VLSTREAM_SSH_USERNAME:oort}
    password: ${VLSTREAM_SSH_PASSWORD:oort301}
  rtsp-recording:
    enabled: ${VLSTREAM_RTSP_RECORDING_ENABLED:true}
    ffmpeg-path: ${VLSTREAM_RTSP_FFMPEG_PATH:ffmpeg}
    default-storage-path: ${VLSTREAM_RTSP_STORAGE_PATH:recordings}
    segment-seconds: ${VLSTREAM_RTSP_SEGMENT_SECONDS:300}
    process-stop-wait-seconds: ${VLSTREAM_RTSP_PROCESS_STOP_WAIT_SECONDS:5}
    stale-file-seconds: ${VLSTREAM_RTSP_STALE_FILE_SECONDS:5}
    refresh-interval-millis: ${VLSTREAM_RTSP_REFRESH_INTERVAL_MILLIS:10000}
  reportUrl: ${REPORT_URL:http://oort.oortcloudsmart.com:21410/bus/apaas-location-service/task/v1/event_report_cameras}
# Recording configuration
recording:
  storage:
    path: recordings
  enabled: true
  default:
    duration: 60
    quality: medium
  base:
    path: recordings
  max:
    concurrent: 5
# Stream conversion configuration
stream:
  # Preferred conversion mode (webrtc | hls)
  preferred-mode: webrtc

  # HLS输出Configuration
  hls:
    output-dir: static/hls/
    segment-time: 2
    list-size: 5
    delete-segments: true

  # FFmpegConfiguration
  ffmpeg:
    path: ffmpeg
    timeout: 30000
    max-concurrent-streams: 5

  # Resource cleanup configuration
  cleanup:
    enabled: true
    interval: 3600000  # 1Hour
    max-idle-time: 600000  # 10Automatically clean after minutes of inactivity

# WebRTCConfiguration
webrtc:
  streamer:
    # WebRTC-streamerServer address
    url: ${WEBRTC_STREAMER_URL:http://webrtc-streamer-server.zglt-1742612481:8000}
    internetUrl: ${WEBRTC_STREAMER__INTERNET_URL:http://oort.oortcloudsmart.com:21410/bus/webrtc-streamer-server}
    # Whether to enableWebRTCFunction
    enabled: true
    # Connection timeout(millisecond)
    timeout: 30000
    # Number of retries
    retry-count: 3
    # STUNServer configuration
    stun-server: stun.l.google.com:19302
    # Whether to enable logs
    verbose: true

