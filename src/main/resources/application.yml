#Report configuration
report:
  enabled: false
  auth: false
  database:
    provider:
      prefix: blade-

#bladeConfiguration
blade:
  #oauth2Configuration
  oauth2:
    #enable oauth2
    enabled: true
    #use @org.springblade.test.Sm2KeyGenerator get,Used for state secretssm2Verification,Need to be consistent with the front end
    public-key: ${BLADE_OAUTH2_PUBLIC_KEY:04bf94e3539e093211b73b2dc3f5900ed8933ddb58c6e14272a7d0a4e19564065300a2276bd621e742ecb176b7f352cd133484d66a759b50c9e3a6fedb447917cc}
    #use @org.springblade.test.Sm2KeyGenerator get,Used for state secretssm2Decrypt,No front-end configuration required
    private-key: ${BLADE_OAUTH2_PRIVATE_KEY:17d796ad64f197f9031ae27e44839ba5496519e787639d7df28747f3e01ebe22}
  #tokenConfiguration
  token:
    #Is there a status
    state: false
    #Whether to log in as a single user
    single: false
    #Single user login scope
    single-level: all
    #tokensign use @org.springblade.test.SignKeyGenerator get
    sign-key: ${BLADE_TOKEN_SIGN_KEY:xvMyVPb2hPR0zFoXjVKzlfkDD2JUyEX0}
    #tokenencryption use @org.springblade.test.CryptoKeyGenerator get
    crypto-key: ${BLADE_TOKEN_CRYPTO_KEY:wnUjLO3eoQLFpk6soVfh2O1EBbaDvFSX}
  #Super key configuration
  key:
    #Enable super key
    enabled: false
    #Key encryption use @org.springblade.test.CryptoKeyGenerator get
    crypto-key: ${BLADE_KEY_CRYPTO_KEY}
  #Interface configuration
  api:
    #Message encryption configuration
    crypto:
      #Enable packet encryption configuration
      enabled: false
      #use @org.springblade.test.CryptoKeyGenerator get,Need to be consistent with the front end
      aes-key: ${BLADE_API_CRYPTO_AES_KEY}
      #use @org.springblade.test.CryptoKeyGenerator get,Need to be consistent with the front end
      des-key: ${BLADE_API_CRYPTO_DES_KEY}
  #jacksonConfiguration
  jackson:
    #nullAutomatically convert to null value
    null-to-empty: false
    #Automatically convert large numbers to strings
    big-num-to-string: false
    #supporttexttext request,Turn on at the same time as message encryption
    support-text-plain: false
  #redisSerialization method
  redis:
    serializer-type: json
  #Log configuration
  log:
    request:
      #Enable console request logging
      enabled: true
      #Console request log ignored
      skip-url:
      #Enable error log storage
      error-log: true
  #xssConfiguration
  xss:
    enabled: true
    skip-url:
      - /blade-chat/wechat
      - /blade-chat/qq
  #Security framework configuration
  secure:
    #strict mode
    #Missing token field cancels authorization
    strict-token: false
    #Missing request headers cancel authorization
    strict-header: false
    #Interface release
    skip-url:
      - /swagger/api-docs.json
    #Authorization authentication configuration
    auth:
      - method: ALL
        pattern: /blade-chat/wechat/**
        expression: "hasAuth()"
      - method: ALL
        pattern: /blade-chat/qq/**
        expression: "hasStrictToken()"
      - method: ALL
        pattern: /blade-chat/ding/**
        expression: "hasStrictHeader()"
      - method: ALL
        pattern: /blade-chat/blog/**
        expression: "hasMenu('blog')"
      - method: POST
        pattern: /blade-desk/dashboard/upload
        expression: "hasTimeAuth(9, 17)"
      - method: POST
        pattern: /blade-desk/dashboard/submit
        expression: "hasAnyRole('administrator', 'admin', 'user')"
    #Basic authentication configuration
    basic:
      - method: ALL
        pattern: /blade-desk/dashboard/info
        username: "blade"
        password: "blade"
    #Dynamic signature authentication configuration
    sign:
      - method: ALL
        pattern: /blade-desk/dashboard/sign
        crypto: "sha1"
    #Multi-terminal authentication configuration
    client:
      - client-id: sword
        path-patterns:
          - /blade-sword/**
      - client-id: saber
        path-patterns:
          - /blade-saber/**
  #Multi-tenant configuration
  tenant:
    #Multi-tenant enhancements
    enhance: true
    #Multi-tenant licensing protection
    license: false
    #Dynamic database isolation function
    dynamic-datasource: false
    #Dynamic database isolation global scan
    dynamic-global: false
    #Multi-tenant field name
    column: tenant_id
    #Exclude multi-tenant logic
    exclude-tables:
      - blade_user
  #Sub-database and sub-table configuration
  sharding:
    enabled: false

