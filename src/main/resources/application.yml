#Server configuration
server:
  port: 8080
  undertow:
    threads:
      # set upIONumber of threads, It mainly performs non-blocking tasks,They will be responsible for multiple connections, Default settings for eachCPUcore one thread
      io: 16
      # Blocking task thread pool, When executing something likeservletRequest blocking operation, undertowWill get threads from this thread pool,Its value setting depends on the load of the system
      worker: 400
    # The following configurations will affectbuffer,ThesebufferWill be used for server connectionsIOoperate,somewhat similarnettyPooled memory management
    buffer-size: 1024
    # Whether direct memory is allocated
    direct-buffers: true

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    #driver-class-name: org.postgresql.Driver
    #driver-class-name: oracle.jdbc.OracleDriver
    #driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    #driver-class-name: dm.jdbc.driver.DmDriver
    #driver-class-name: com.yashandb.jdbc.Driver
    #driver-class-name: com.kingbase8.Driver
    druid:
      # MySql、PostgreSQL、SqlServer、DaMengcheck
      validation-query: select 1
      # Oracle、YashanDBcheck
      #oracle: true
      #validation-query: select 1 from dual
      validation-query-timeout: 2000
      initial-size: 5
      max-active: 20
      min-idle: 5
      max-wait: 60000
      test-on-borrow: false
      test-on-return: false
      test-while-idle: true
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      stat-view-servlet:
        enabled: true
        login-username: blade
        login-password: 1qaz@WSX
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: '*.js,*.gif,*.jpg,*.bmp,*.png,*.css,*.ico,/druid/*'
        session-stat-enable: true
        session-stat-max-count: 10
#Configure log address
logging:
  config: classpath:log/logback-${blade.env}.xml
# mybatis
mybatis-plus:
  mapper-locations: classpath:org/springblade/**/mapper/*Mapper.xml
  #Entity scan, multiplepackageSeparate with commas or semicolons
  typeAliasesPackage: org.springblade.**.entity
  #typeEnumsPackage: org.springblade.dashboard.entity.enums
  global-config:
    # closureMP3.0Comes with itbanner
    banner: false
    db-config:
      #Primary key type  0:"databaseIDself-increasing", 1:"No operation", 2:"user inputID",3:"digitalsnowflake", 4:"Globally uniqueID UUID", 5:"string typesnowflake";
      id-type: assign_id
      #Field strategy
      insert-strategy: not_null
      update-strategy: not_null
      where-strategy: not_null
      #CamelCase Underscore Conversion
      table-underline: true
      # Tombstone configuration
      # tombstone global value(1means deleted, This is alsoMybatis PlusThe default configuration of)
      logic-delete-value: 1
      # Logical not deleting global values(0means not deleted, This is alsoMybatis PlusThe default configuration of)
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    jdbc-type-for-null: 'null'

#springdoc-openapiConfiguration
springdoc:
  default-flat-param-object: false

#knife4jConfiguration
knife4j:
  #Basic certification
  basic:
    enable: false
    username: blade
    password: blade
  #Enhance configuration
  setting:
    enable-swagger-models: true
    enable-document-manage: true
    enable-host: false
    enable-host-text: http://localhost
    enable-request-cache: true
    enable-filter-multipart-apis: false
    enable-filter-multipart-api-method-type: POST
    enable-footer: false
    enable-footer-custom: true
    language: zh_cn
    footer-custom-content: Copyright © 2025 Oort All Rights Reserved

