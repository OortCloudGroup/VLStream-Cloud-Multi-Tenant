#数据源配置
spring:
  data:
    redis:
      ##redis 单机环境配置
      host: ${REDIS_HOST:192.168.60.76}
      port: ${REDIS_PORT:32576}
      database: 1
      password: ${REDIS_PASSWORD:redis@pass}
      ssl:
        enabled: false
      ##redis 集群环境配置
      #cluster:
      #  nodes: 127.0.0.1:7001,127.0.0.1:7002,127.0.0.1:7003
      #  commandTimeout: 5000
  #排除DruidDataSourceAutoConfigure
  datasource:
    # MySql 主数据源信息
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:192.168.60.75}:${DB_PORT:32433}/apaas_vlstream?useSSL=false&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&serverTimezone=GMT%2B8&nullCatalogMeansCurrent=true&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:mysql@pass}
#第三方登陆
social:
  enabled: true
  domain: http://127.0.0.1:2888

#oss默认配置
oss:
  #开启oss配置
  enabled: true
  #开启oss类型
  #minio、s3、qiniu、alioss、huaweiobs、tencentcos
  name: minio
  #租户模式
  tenant-mode: true
  #oss服务地址
  endpoint: http://172.30.0.90:9000
  #oss转换服务地址，用于内网上传后将返回地址改为转换的外网地址
  #transform-endpoint: http://172.30.0.90:9000
  #访问key
  access-key: bladexadmin
  #密钥key
  secret-key: bladexadmin
  #存储桶
  bucket-name: bladex

#blade配置
blade:
  #分布式锁配置
  lock:
    ##是否启用分布式锁
    enabled: true
    address: redis://${REDIS_HOST:192.168.60.76}:${REDIS_PORT:32576}
    password: ${REDIS_PASSWORD:redis@pass}
    database: 13
  token:
    #租户类型配置 单租户还是多租户 single multi
    tenant-type: ${SSO_TENANT_TYPE:single}
    #多租户校验token地址
    multi-tenant-verify-token-address: ${SSO_MULTI_TENANT_VERIFY_TOKEN:http://apaas-sso.p-lvgemgroup/sso/v1/verifyToken}
    #获取多租户用户信息
    multi-tenant-admin-user-url: ${GET_MULTI_TENANT_ADMIN_USER_URL:http://apaas-user.p-lvgemgroup/user/v1/userInfo}
    #单租户校验token地址
    single-tenant-verify-token-address: ${SSO_SINGLE_TENANT_VERIFY_TOKEN:http://oortcloud-sso.oort-apaas/sso/v1/verifyToken}
    #获取单租户用户信息
    single-tenant-admin-user-url: ${GET_SINGLE_TENANT_ADMIN_USER_URL:http://oortcloud-sso.oort-apaas/sso/v1/getUserInfo}
